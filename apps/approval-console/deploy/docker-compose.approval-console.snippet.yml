
# Snippet only. Do not apply blindly over the VPS compose stack.
# Selected host port checked on this VPS: 127.0.0.1:3010

services:
  approval-console:
    build:
      context: ../apps/approval-console
    container_name: rikanv-approval-console
    restart: unless-stopped
    env_file:
      - ../apps/approval-console/.env
    ports:
      - "127.0.0.1:3010:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    # Attach this service to the existing Docker PostgreSQL network if needed.
    # Do not define or replace the existing PostgreSQL container here.
